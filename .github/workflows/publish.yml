name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to publish, for example v0.1.2'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  NO_COLOR: '1'
  FORCE_COLOR: '0'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Read package metadata
        id: meta
        run: |
          VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          PACKAGE=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "tarball=$PACKAGE-$VERSION.tgz" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        run: |
          test "${{ steps.tag.outputs.value }}" = "v${{ steps.meta.outputs.version }}"

      - name: Resolve previous upstream pin
        id: previous_upstream
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${{ steps.tag.outputs.value }}^" 2>/dev/null || true)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_previous=true" >> "$GITHUB_OUTPUT"
          echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          PREVIOUS_TAG="$PREVIOUS_TAG" node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const cp = require('node:child_process');
          const previousTag = process.env.PREVIOUS_TAG;
          const previous = JSON.parse(cp.execFileSync('git', ['show', `${previousTag}:upstream-gstack.json`], { encoding: 'utf8' }));
          const current = JSON.parse(fs.readFileSync('upstream-gstack.json', 'utf8'));
          console.log(`previous_commit=${previous.pinned_commit}`);
          console.log(`current_commit=${current.pinned_commit}`);
          NODE

      - name: Check npm package version
        id: npm_version
        run: |
          if npm view "${{ steps.meta.outputs.package }}@${{ steps.meta.outputs.version }}" version >/tmp/npm-version.txt 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            cat /tmp/npm-version.txt
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap upstream gstack from tracked pin
        run: node ./scripts/bootstrap-upstream-gstack.mjs --clean

      - name: Run tests
        run: bun test

      - name: Build release artifacts
        env:
          GSTACK_CODEX_UPSTREAM_ROOT: ${{ github.workspace }}/dist/.upstream/gstack
        run: node ./scripts/build-release-artifacts.mjs

      - name: Pack npm artifact
        env:
          GSTACK_CODEX_UPSTREAM_ROOT: ${{ github.workspace }}/dist/.upstream/gstack
        run: node ./scripts/pack-release.mjs

      - name: Run release compatibility gate
        run: npm run check:release

      - name: Generate upstream diff report
        if: >-
          ${{
            steps.previous_upstream.outputs.has_previous == 'true' &&
            steps.previous_upstream.outputs.previous_commit != steps.previous_upstream.outputs.current_commit
          }}
        env:
          GSTACK_CODEX_UPSTREAM_ROOT: ${{ github.workspace }}/dist/.upstream/gstack
        run: |
          node ./scripts/report-upstream-diff.mjs \
            --previous "${{ steps.previous_upstream.outputs.previous_commit }}" \
            --current "${{ steps.previous_upstream.outputs.current_commit }}" \
            --output "${{ github.workspace }}/dist/releases/${{ steps.meta.outputs.version }}/upstream-diff-report.md"

      - name: Publish to npm with trusted publishing
        if: steps.npm_version.outputs.published != 'true'
        run: npm publish "dist/releases/${{ steps.meta.outputs.version }}/npm/${{ steps.meta.outputs.tarball }}" --access public

      - name: Report existing npm package version
        if: steps.npm_version.outputs.published == 'true'
        run: echo "npm already has ${{ steps.meta.outputs.package }}@${{ steps.meta.outputs.version }}. Skipping npm publish and refreshing GitHub Release assets."

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.tag.outputs.value }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.tag.outputs.value }}" \
              "dist/releases/${{ steps.meta.outputs.version }}/release.json" \
              "dist/releases/${{ steps.meta.outputs.version }}/SHA256SUMS.txt" \
              "dist/releases/${{ steps.meta.outputs.version }}/npm/${{ steps.meta.outputs.tarball }}" \
              --clobber
          else
            gh release create "${{ steps.tag.outputs.value }}" \
              "dist/releases/${{ steps.meta.outputs.version }}/release.json" \
              "dist/releases/${{ steps.meta.outputs.version }}/SHA256SUMS.txt" \
              "dist/releases/${{ steps.meta.outputs.version }}/npm/${{ steps.meta.outputs.tarball }}" \
              --title "${{ steps.tag.outputs.value }}" \
              --notes "npm package ${{ steps.meta.outputs.package }}@${{ steps.meta.outputs.version }} published from tracked upstream pin."
          fi

      - name: Upload upstream diff report to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="dist/releases/${{ steps.meta.outputs.version }}/upstream-diff-report.md"
          if [ -f "$REPORT" ]; then
            gh release upload "${{ steps.tag.outputs.value }}" "$REPORT" --clobber
          else
            echo "No upstream diff report for ${{ steps.tag.outputs.value }}."
          fi
